<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OVAX Singapore Company Law AI</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; }
    body { margin: 0; background: #07110e; color: #ecfff7; }
    main { width: min(900px, calc(100% - 32px)); margin: 64px auto; }
    .eyebrow { color: #78e6b3; letter-spacing: .12em; text-transform: uppercase; font-size: 12px; }
    h1 { font-size: clamp(34px, 6vw, 64px); margin: 10px 0; line-height: 1; }
    .lead { color: #a9c7bb; max-width: 680px; }
    .panel { margin-top: 32px; padding: 22px; border: 1px solid #234a3d; border-radius: 18px; background: #0d1b17; }
    textarea { width: 100%; min-height: 120px; box-sizing: border-box; padding: 16px; border-radius: 12px; border: 1px solid #315d4e; background: #07110e; color: white; font: inherit; resize: vertical; }
    button { margin-top: 12px; padding: 12px 18px; border: 0; border-radius: 999px; background: #68e0aa; color: #062016; font-weight: 750; cursor: pointer; }
    button:disabled { opacity: .6; cursor: wait; }
    pre { white-space: pre-wrap; line-height: 1.55; font-family: inherit; }
    .source { padding: 12px 0; border-top: 1px solid #234a3d; }
    a { color: #78e6b3; }
    small { color: #91aa9f; }
    .error { color: #ffb8b8; }
  </style>
</head>
<body>
<main>
  <div class="eyebrow">OVAX · Legal intelligence MVP</div>
  <h1>Singapore Company Law AI</h1>
  <p class="lead">A small retrieval-based test using curated summaries and official Singapore legal sources. It is deliberately limited before automated collection is added.</p>

  <section class="panel">
    <label for="question"><strong>Ask a question</strong></label>
    <textarea id="question">Does a Singapore company need a resident director?</textarea>
    <button id="ask">Ask OVAX</button>
  </section>

  <section class="panel" id="result" hidden>
    <h2>Answer</h2>
    <pre id="answer"></pre>
    <h3>Sources</h3>
    <div id="sources"></div>
    <small id="disclaimer"></small>
  </section>
</main>

<script>
const button = document.getElementById("ask");
const result = document.getElementById("result");
const answer = document.getElementById("answer");
const sources = document.getElementById("sources");
const disclaimer = document.getElementById("disclaimer");

button.addEventListener("click", async () => {
  button.disabled = true;
  button.textContent = "Checking sources…";
  result.hidden = false;
  answer.className = "";
  answer.textContent = "Loading…";
  sources.innerHTML = "";

  try {
    const response = await fetch("/api/ask", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        question: document.getElementById("question").value,
        top_k: 3
      })
    });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    answer.textContent = `${data.answer}\n\nMode: ${data.mode}`;
    data.sources.forEach((source, index) => {
      const item = document.createElement("div");
      item.className = "source";
      item.innerHTML = `<strong>[Source ${index + 1}] ${source.title}</strong><br>
        <span>${source.topic}</span><br>
        <a href="${source.source_url}" target="_blank" rel="noopener">Open official source</a>`;
      sources.appendChild(item);
    });
    disclaimer.textContent = data.disclaimer;
  } catch (error) {
    answer.className = "error";
    answer.textContent = `Request failed: ${error.message}`;
  } finally {
    button.disabled = false;
    button.textContent = "Ask OVAX";
  }
});
</script>
</body>
</html>
